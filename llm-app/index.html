<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Локальный ИИ-ассистент</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <h1>Локальный ИИ-ассистент</h1>
        <span class="badge">ОФЛАЙН</span>
    </div>
    <p>Задайте вопрос — нейросеть ответит, используя только локальные ресурсы компьютера.</p>

    <textarea id="prompt" placeholder="Например: Объясни, что такое нейронные сети, простыми словами"></textarea>
    <br>
    <button onclick="ask()">Сгенерировать</button>
    <div id="result"></div>

    <script src="/script.js"></script>
</body>
</html>
